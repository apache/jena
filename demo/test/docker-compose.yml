services:
  fuseki:
    image: ghcr.io/aiworkerjohns/fuseki-ai:6.1.0-SNAPSHOT
    ports:
      - "3030:3030"
    volumes:
      - ./config.ttl:/fuseki/config.ttl:ro
      - fuseki-db:/fuseki/DB
      - fuseki-lucene:/fuseki/Lucene

volumes:
  fuseki-db:
  fuseki-lucene:
