<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Search &mdash; Search Tester</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.2/css/bulma.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="app.css">
  <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/n3@1.22.3/browser/n3.min.js"></script>
  <script src="app-config.js"></script>
  <script src="app.js"></script>
  <script>
    document.addEventListener('alpine:init', () => {
      Alpine.store('app', { showLog: true, showMap: true, highlightUri: null });
    });
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js"></script>
</head>
<body>
  <nav class="site-navbar" role="navigation" aria-label="main navigation">
    <div class="navbar-brand">
      <span class="brand-icon">&#9670;</span>
      <a class="brand-name" href="index.html">Search Tester</a>
      <span class="version-badge">v6.1</span>
      <button class="navbar-burger" aria-label="menu" aria-expanded="false" data-target="mainNav">
        <span aria-hidden="true"></span>
        <span aria-hidden="true"></span>
        <span aria-hidden="true"></span>
      </button>
    </div>
    <div id="mainNav" class="navbar-tabs">
      <a class="nav-tab is-tab-active" href="index.html">Search</a>
      <a class="nav-tab" href="config.html">Configuration</a>
      <a class="nav-tab" href="stats.html">Stats</a>
    </div>
    <div class="navbar-end" x-data>
      <div class="navbar-dropdown-wrapper" id="tests-wrapper" style="display:none">
        <button class="tests-btn" type="button" id="tests-toggle">
          Tests <span class="dropdown-caret" id="tests-caret">&#9662;</span>
        </button>
        <div class="tests-dropdown" id="tests-menu"></div>
      </div>
      <label class="navbar-toggle">
        <input type="checkbox" :checked="$store.app.showMap" @change="$store.app.showMap = !$store.app.showMap">
        <span>Map</span>
      </label>
      <label class="navbar-toggle">
        <input type="checkbox" :checked="$store.app.showLog" @change="$store.app.showLog = !$store.app.showLog">
        <span>Log</span>
      </label>
    </div>
  </nav>

  <section class="section">
    <div class="container is-fluid main-content" x-data="searchApp()" x-cloak>

      <div class="loading-bar" :class="{ 'is-loading': showLoading }"></div>

      <template x-if="error">
        <div class="notice-error" x-text="error"></div>
      </template>

      <div class="columns mb-0" x-show="!error">
        <div class="column left-panel"></div>
        <div class="column">
          <p class="results-description" x-html="description"></p>
        </div>
        <div class="column right-panel" x-show="$store.app.showMap || $store.app.showLog">
          <p class="results-description" x-show="$store.app.showMap"
             x-text="mapMarkerCount + ' of ' + cards.length + ' results mapped'"></p>
        </div>
      </div>

      <div class="columns search-layout">

        <!-- Sidebar: search + facets -->
        <div class="column left-panel">
          <div class="facet-sidebar">
            <div class="sidebar-panel">
              <div class="sidebar-header">Search &amp; Filter</div>

              <div class="field has-addons">
                <div class="control is-expanded">
                  <input class="input" type="text" x-model="q"
                         placeholder="e.g. copper, gold, iron ore"
                         @keydown.enter="search()">
                </div>
                <div class="control">
                  <button class="btn-search" type="button" @click="search()">Search</button>
                </div>
              </div>

              <div class="limit-row">
                <div class="limit-control">
                  <label class="limit-label">Results</label>
                  <select class="limit-select" x-model.number="limit" @change="search()">
                    <template x-for="n in resultLimits" :key="n">
                      <option :value="n" x-text="n.toLocaleString()"></option>
                    </template>
                  </select>
                </div>
                <div class="limit-control">
                  <label class="limit-label">Facets</label>
                  <select class="limit-select" x-model.number="maxFacetValues" @change="search()">
                    <template x-for="n in facetLimits" :key="n">
                      <option :value="n" x-text="n.toLocaleString()"></option>
                    </template>
                  </select>
                </div>
              </div>

              <template x-if="hasActiveFilters()">
                <button class="btn-clear-filters" type="button" @click="clearFilters()">
                  &#10005; Clear all filters
                </button>
              </template>

              <template x-if="spatialBbox || spatialPolygon">
                <details class="facet-group" open>
                  <summary class="facet-group-label">spatial</summary>
                  <template x-if="spatialBbox">
                    <label class="facet-option spatial-filter-active">
                      <input type="checkbox" checked @change="clearBbox(); search()">
                      <span class="facet-value">Bounding box</span>
                    </label>
                  </template>
                  <template x-if="spatialPolygon">
                    <label class="facet-option spatial-filter-active">
                      <input type="checkbox" checked @change="clearPolygon(); search()">
                      <span class="facet-value">Polygon</span>
                    </label>
                  </template>
                </details>
              </template>

              <template x-for="fieldName in facetFields" :key="fieldName">
                <div>
                  <template x-if="(facets[fieldName] || []).length > 0">
                    <details class="facet-group" open>
                      <summary class="facet-group-label" x-text="fieldName" :title="fieldIRIs[fieldName] || fieldName"></summary>
                      <template x-for="fv in visibleFacets(fieldName)" :key="fv.value">
                        <label class="facet-option">
                          <input type="checkbox"
                                 :checked="isSelected(fieldName, fv.value)"
                                 @change="toggleFacet(fieldName, fv.value)">
                          <span class="facet-value" x-text="fv.label || fv.value" :title="fv.value"></span>
                          <span class="facet-count" x-text="fv.count"></span>
                        </label>
                      </template>
                      <template x-if="(facets[fieldName] || []).length > 5">
                        <button class="facet-toggle-btn"
                                @click="facetExpanded[fieldName] = !facetExpanded[fieldName]">
                          <span x-text="facetExpanded[fieldName]
                            ? '\u25B4 Show less'
                            : '\u25BE Show all ' + (facets[fieldName] || []).length"></span>
                        </button>
                      </template>
                    </details>
                  </template>
                </div>
              </template>

            </div>
          </div>
        </div>

        <!-- Resize handle: left -->
        <div class="resize-handle" @mousedown="startResizeLeft($event)"></div>

        <!-- Main content: results -->
        <div class="column">

          <template x-if="!error && cards.length === 0 && !loading">
            <div class="notice-empty">
              No results found. Try broadening your search or clearing filters.
            </div>
          </template>

          <template x-for="card in cards" :key="card.uri">
            <div class="result-card" :data-uri="card.uri"
                 :class="{ 'is-highlighted': $store.app.highlightUri === card.uri }">
              <div class="result-card-header">
                <span class="result-card-label" x-text="card.label"></span>
                <span class="result-card-score">
                  <span class="score-label">score</span>
                  <span class="score-value" x-text="card.score.toFixed(2)"></span>
                </span>
              </div>

              <template x-if="card.description">
                <p class="result-description"
                   x-text="card.description.length > 300
                     ? card.description.substring(0, 300) + '\u2026'
                     : card.description">
                </p>
              </template>

              <div class="result-tags">
                <template x-for="tag in card.tags" :key="tag.pred + ':' + tag.value">
                  <span class="rtag" :class="tag.cssClass"
                        x-text="tag.displayValue || tag.value"
                        :title="tag.tooltip || ''"
                        :tabindex="(tag.clickable || tag.mapUri) ? 0 : -1"
                        @click="tag.mapUri ? focusMapMarker(tag.mapUri) : (tag.clickable && toggleFacet(tag.facetField, tag.value))"
                        @keydown.enter="tag.mapUri ? focusMapMarker(tag.mapUri) : (tag.clickable && toggleFacet(tag.facetField, tag.value))">
                  </span>
                </template>
              </div>
            </div>
          </template>

        </div>

        <!-- Resize handle -->
        <div class="resize-handle" @mousedown="startResize($event)"
             x-show="$store.app.showMap || $store.app.showLog"></div>

        <!-- Right panel: map + log -->
        <div class="column right-panel" x-show="$store.app.showMap || $store.app.showLog" x-transition.opacity>

          <div class="map-panel" x-show="$store.app.showMap">
            <div class="map-header">
              <span class="sidebar-header" style="margin-bottom:0">Map</span>
              <div class="map-controls">
                <template x-if="!drawingPolygon">
                  <button class="btn-map-tool" type="button"
                          :class="{ 'is-active': drawingBbox }"
                          @click="drawingBbox ? cancelBboxDraw() : enableBboxDraw()"
                          title="Draw bounding box to filter results spatially">
                    <span class="map-tool-icon">&#9633;</span> Bbox
                  </button>
                </template>
                <template x-if="!drawingBbox">
                  <button class="btn-map-tool" type="button"
                          :class="{ 'is-active': drawingPolygon }"
                          @click="drawingPolygon ? cancelPolygonDraw() : enablePolygonDraw()"
                          title="Click map to place vertices, then press Done to apply filter">
                    <span class="map-tool-icon">&#11040;</span> Polygon
                  </button>
                </template>
                <template x-if="drawingPolygon && polyPoints.length >= 3">
                  <button class="btn-map-tool is-active" type="button"
                          @click="finishPolygonDraw()"
                          title="Close polygon and apply spatial filter">
                    &#10003; Done
                  </button>
                </template>
                <template x-if="drawingPolygon">
                  <span class="bbox-label"
                        x-text="polyPoints.length + ' point' + (polyPoints.length !== 1 ? 's' : '') + (polyPoints.length < 3 ? ' (need 3+)' : '')">
                  </span>
                </template>
                <template x-if="spatialBbox && !drawingBbox && !drawingPolygon">
                  <button class="btn-map-tool btn-map-clear" type="button"
                          @click="clearBboxAndSearch()"
                          title="Remove bbox filter">
                    &#10005; Bbox
                  </button>
                </template>
                <template x-if="spatialPolygon && !drawingBbox && !drawingPolygon">
                  <button class="btn-map-tool btn-map-clear" type="button"
                          @click="clearPolygonAndSearch()"
                          title="Remove polygon filter">
                    &#10005; Polygon
                  </button>
                </template>
                <template x-if="spatialBbox && !drawingBbox && !drawingPolygon">
                  <span class="bbox-label" x-text="spatialBbox.map(n => n.toFixed(1)).join(', ')"></span>
                </template>
                <template x-if="spatialPolygon && !drawingBbox && !drawingPolygon">
                  <span class="bbox-label" x-text="(spatialPolygon.length - 1) + ' vertices'"></span>
                </template>
              </div>
            </div>
            <div id="search-map"></div>
          </div>

          <div class="query-log-panel" x-show="$store.app.showLog">
            <div class="sidebar-header">Log</div>

            <template x-if="queryLog.length === 0">
              <p class="query-log-empty">Queries will appear here as you search.</p>
            </template>

            <template x-for="(entry, i) in queryLog" :key="i">
              <div class="query-log-entry" :class="{ 'is-new': i === 0, 'is-sparql': entry.isSparql, 'is-cql': entry.isCql }"
                   @click="entry.isSparql ? openEditor(entry.query) : (entry.isCql && openCql(entry.query))"
                   :title="entry.isSparql ? 'Click to open in editor' : (entry.isCql ? 'Click to view CQL' : '')">
                <div class="query-log-meta">
                  <span class="query-log-timestamp" x-text="entry.time"></span>
                  <span class="query-log-label" x-text="entry.label"></span>
                </div>
                <pre class="query-log-code"><code x-text="entry.query"></code></pre>
              </div>
            </template>
          </div>

        </div>

      </div>

      <!-- SPARQL Editor (must be inside x-data scope) -->
      <div class="sparql-editor" x-show="editorOpen" x-cloak
           @click.outside="closeEditor()"
           :style="`right:${_editorRight}px; top:${_editorTop}px; width:${_editorWidth}px`">
        <div class="sparql-editor-header" @mousedown.prevent="
          const startX = $event.clientX, startY = $event.clientY;
          const startR = _editorRight, startT = _editorTop;
          const move = e => { _editorRight = startR - (e.clientX - startX); _editorTop = startT + (e.clientY - startY); };
          const up = () => { window.removeEventListener('mousemove', move); window.removeEventListener('mouseup', up); };
          window.addEventListener('mousemove', move); window.addEventListener('mouseup', up);
        ">
          <span>SPARQL Editor</span>
          <button class="sparql-editor-close" @click="closeEditor()">&times;</button>
        </div>
        <div class="sparql-editor-resize" @mousedown.prevent="
          const startX = $event.clientX, startW = _editorWidth;
          const move = e => { _editorWidth = Math.max(320, startW - (e.clientX - startX)); };
          const up = () => { window.removeEventListener('mousemove', move); window.removeEventListener('mouseup', up); };
          window.addEventListener('mousemove', move); window.addEventListener('mouseup', up);
        "></div>
        <div class="sparql-editor-body">
          <textarea class="sparql-editor-input" x-model="editorQuery"
                    @keydown.ctrl.enter="runEditorQuery()"
                    @keydown.meta.enter="runEditorQuery()"></textarea>
          <div class="sparql-editor-toolbar">
            <button class="sparql-editor-run" @click="runEditorQuery()" :disabled="editorRunning">
              <span x-text="editorRunning ? 'Running...' : 'Run (Ctrl+Enter)'"></span>
            </button>
            <template x-if="editorHasTable()">
              <div class="sparql-editor-view-toggle">
                <button :class="{ active: editorView === 'table' }" @click="editorView = 'table'">Table</button>
                <button :class="{ active: editorView === 'json' }" @click="editorView = 'json'">JSON</button>
              </div>
            </template>
            <input class="sparql-editor-endpoint-input" type="text" x-model="editorEndpoint"
                   @keydown.ctrl.enter="runEditorQuery()" @keydown.meta.enter="runEditorQuery()">
          </div>
          <template x-if="editorError">
            <pre class="sparql-editor-error" x-text="editorError"></pre>
          </template>
          <template x-if="editorResults && editorView === 'json'">
            <pre class="sparql-editor-results"><code x-text="editorResults"></code></pre>
          </template>
          <template x-if="editorHasTable() && editorView === 'table'">
            <div class="sparql-editor-table-wrap">
              <table class="sparql-editor-table">
                <thead>
                  <tr>
                    <template x-for="v in editorTableVars()" :key="v">
                      <th x-text="'?' + v"></th>
                    </template>
                  </tr>
                </thead>
                <tbody>
                  <template x-for="(row, ri) in editorTableRows()" :key="ri">
                    <tr>
                      <template x-for="(cell, ci) in row" :key="ci">
                        <td x-text="cell"></td>
                      </template>
                    </tr>
                  </template>
                </tbody>
              </table>
            </div>
          </template>
        </div>
      </div>

      <!-- CQL Viewer -->
      <div class="cql-viewer" x-show="cqlOpen" x-cloak
           @click.outside="closeCql()"
           :style="`right:${_cqlRight}px; top:${_cqlTop}px; width:${_cqlWidth}px`">
        <div class="cql-viewer-header" @mousedown.prevent="
          const startX = $event.clientX, startY = $event.clientY;
          const startR = _cqlRight, startT = _cqlTop;
          const move = e => { _cqlRight = startR - (e.clientX - startX); _cqlTop = startT + (e.clientY - startY); };
          const up = () => { window.removeEventListener('mousemove', move); window.removeEventListener('mouseup', up); };
          window.addEventListener('mousemove', move); window.addEventListener('mouseup', up);
        ">
          <span>CQL Filter</span>
          <div class="cql-viewer-actions">
            <div class="sparql-editor-view-toggle">
              <button :class="{ active: cqlView === 'object' }" @click="cqlView = 'object'">Object</button>
              <button :class="{ active: cqlView === 'raw' }" @click="cqlView = 'raw'">Raw</button>
            </div>
            <template x-if="cqlView === 'object'">
              <button class="cql-viewer-btn" @click="$refs.cqlTree.querySelectorAll('details').forEach(d => d.open = true)">Expand all</button>
            </template>
            <template x-if="cqlView === 'object'">
              <button class="cql-viewer-btn" @click="$refs.cqlTree.querySelectorAll('details').forEach(d => d.open = false)">Collapse all</button>
            </template>
            <button class="cql-viewer-close" @click="closeCql()">&times;</button>
          </div>
        </div>
        <template x-if="cqlView === 'object'">
          <div class="cql-viewer-body" x-ref="cqlTree" x-html="cqlJson ? renderJsonTree(cqlJson) : ''"></div>
        </template>
        <template x-if="cqlView === 'raw'">
          <pre class="cql-viewer-raw"><code x-text="cqlRaw"></code></pre>
        </template>
      </div>

    </div>
  </section>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const burger = document.querySelector('.navbar-burger');
      const menu = document.getElementById(burger.dataset.target);
      burger.addEventListener('click', () => {
        burger.classList.toggle('is-active');
        menu.classList.toggle('is-active');
      });

      // Tests dropdown — loaded from tests.json, vanilla JS toggle
      const testsWrapper = document.getElementById('tests-wrapper');
      const testsMenu = document.getElementById('tests-menu');
      const testsToggle = document.getElementById('tests-toggle');
      const testsCaret = document.getElementById('tests-caret');
      loadTestCases().then(cases => {
        if (!cases || cases.length === 0) return;
        testsMenu.innerHTML = cases.map(tc => {
          if (tc.group) return '<div class="dropdown-group">' + tc.group + '</div>';
          let href = 'index.html';
          if (tc.params) {
            const qs = new URLSearchParams(tc.params.replace(/^\?/, ''));
            href += '?' + qs.toString();
          }
          return '<a class="dropdown-item" href="' + href + '">' + tc.label + '</a>';
        }).join('');
        testsWrapper.style.display = '';
      });
      testsToggle.addEventListener('click', (e) => {
        e.stopPropagation();
        const open = testsMenu.style.display !== 'block';
        testsMenu.style.display = open ? 'block' : 'none';
        testsCaret.classList.toggle('is-open', open);
      });
      document.addEventListener('click', () => {
        testsMenu.style.display = 'none';
        testsCaret.classList.remove('is-open');
      });

      requestAnimationFrame(() => {
        document.querySelector('.main-content').classList.add('is-visible');
      });
    });
  </script>
</body>
</html>
