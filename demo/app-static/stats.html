<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Stats &mdash; Search Tester</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.2/css/bulma.min.css">
  <link rel="stylesheet" href="app.css">
  <script src="https://cdn.jsdelivr.net/npm/n3@1.22.3/browser/n3.min.js"></script>
  <script src="app-config.js"></script>
  <script src="app.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js"></script>
</head>
<body>
  <nav class="site-navbar" role="navigation" aria-label="main navigation">
    <div class="navbar-brand">
      <span class="brand-icon">&#9670;</span>
      <a class="brand-name" href="index.html">Search Tester</a>
      <span class="version-badge">v6.1</span>
      <button class="navbar-burger" aria-label="menu" aria-expanded="false" data-target="mainNav">
        <span aria-hidden="true"></span>
        <span aria-hidden="true"></span>
        <span aria-hidden="true"></span>
      </button>
    </div>
    <div id="mainNav" class="navbar-tabs">
      <a class="nav-tab" href="index.html">Search</a>
      <a class="nav-tab" href="config.html">Configuration</a>
      <a class="nav-tab is-tab-active" href="stats.html">Stats</a>
    </div>
  </nav>

  <section class="section">
    <div class="container is-fluid main-content" x-data="statsApp()" x-cloak>

      <div class="loading-bar" :class="{ 'is-loading': loading }"></div>

      <template x-if="error">
        <div class="notice-error" x-text="error"></div>
      </template>

      <template x-if="loading && !error">
        <p style="color: var(--text-secondary); font-size: 0.9rem;">Loading dataset statistics&hellip;</p>
      </template>

      <template x-if="stats">
        <div>
          <h1 class="config-title">Dataset Statistics</h1>

          <div class="stats-grid">
            <div class="stat-card">
              <div class="stat-value" x-text="stats.totalEntities.toLocaleString()"></div>
              <div class="stat-label">Indexed Entities</div>
            </div>
            <div class="stat-card">
              <div class="stat-value" x-text="stats.totalTriples.toLocaleString()"></div>
              <div class="stat-label">Total Triples</div>
            </div>
            <div class="stat-card">
              <div class="stat-value" x-text="stats.shapes"></div>
              <div class="stat-label">Shapes</div>
            </div>
            <div class="stat-card">
              <div class="stat-value" x-text="stats.facetableFields"></div>
              <div class="stat-label">Facetable Fields</div>
            </div>
            <div class="stat-card">
              <div class="stat-value" x-text="(stats.totalMs / 1000).toFixed(2) + 's'"></div>
              <div class="stat-label">Query Time</div>
            </div>
          </div>

          <p style="margin-bottom: 1.5rem;">
            <span class="perf-badge">Lucene + facets: <span x-text="stats.statsQueryMs.toFixed(0)"></span>ms</span>
            <span class="perf-badge" style="margin-left: 0.5rem;">Triple count: <span x-text="stats.countQueryMs.toFixed(0)"></span>ms</span>
          </p>

          <div class="config-header-row">
            <h2 class="config-section-title" style="margin-bottom:0">Facet Breakdown</h2>
            <div class="sparql-editor-view-toggle">
              <button :class="{ active: nameMode === 'short' }" @click="nameMode = 'short'">Short Name</button>
              <button :class="{ active: nameMode === 'full' }" @click="nameMode = 'full'">Full Name</button>
            </div>
          </div>

          <table class="config-table">
            <thead>
              <tr>
                <th>Facet</th>
                <th>Distinct Values</th>
                <th>Top 10 Values</th>
              </tr>
            </thead>
            <tbody>
              <template x-for="fieldName in stats.facetFields" :key="fieldName">
                <tr x-show="(stats.facets[fieldName] || []).length > 0">
                  <td style="font-weight:600;white-space:nowrap"
                      x-text="nameMode === 'full' ? (stats.fieldIRIs[fieldName] || fieldName) : fieldName"></td>
                  <td style="font-family:var(--font-mono);color:var(--amber)" x-text="(stats.facets[fieldName] || []).length"></td>
                  <td>
                    <template x-for="fv in (stats.facets[fieldName] || []).slice(0, 10)" :key="fv.value">
                      <span style="display:inline-flex;align-items:center;gap:0.2em;margin-right:0.75em;font-size:0.8rem">
                        <span x-text="nameMode === 'full' ? fv.value : (fv.label || fv.value)"></span>
                        <span style="font-family:var(--font-mono);font-size:0.65rem;color:var(--text-muted);background:var(--bg-elevated);padding:0.1em 0.35em;border-radius:3px" x-text="fv.count.toLocaleString()"></span>
                      </span>
                    </template>
                  </td>
                </tr>
              </template>
            </tbody>
          </table>
        </div>
      </template>

    </div>
  </section>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const burger = document.querySelector('.navbar-burger');
      const menu = document.getElementById(burger.dataset.target);
      burger.addEventListener('click', () => {
        burger.classList.toggle('is-active');
        menu.classList.toggle('is-active');
      });

      requestAnimationFrame(() => {
        document.querySelector('.main-content').classList.add('is-visible');
      });
    });
  </script>
</body>
</html>
