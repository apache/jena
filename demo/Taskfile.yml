version: '3'

vars:
  VERSION: 6.1.0-SNAPSHOT
  FUSEKI_JAR: ../jena-fuseki2/jena-fuseki-server/target/jena-fuseki-server-{{.VERSION}}.jar
  SERVER_URL: http://localhost:3030
  IMAGE_NAME: '{{.IMAGE_NAME | default "fuseki-ai"}}'
  IMAGE_TAG: '{{.IMAGE_TAG | default .VERSION}}'
  GHCR_OWNER: '{{.GHCR_OWNER | default "aiworkerjohns"}}'

tasks:
  # ── Shared ───────────────────────────────────────────────

  build:
    desc: Build the Fuseki server JAR (includes jena-text)
    dir: ..
    cmds:
      - mvn clean install -pl jena-fuseki2/jena-fuseki-server -am -DskipTests

  stop:
    desc: Stop the running Fuseki server (sends SIGTERM for clean shutdown)
    cmds:
      - pkill -f "jena-fuseki-server" && echo "Server stopped" || echo "No server running"

  overview:
    desc: Serve the project overview presentation
    cmds:
      - echo "Serving at http://localhost:8001"
      - cmd: python3 -m http.server 8001 --directory project-overview

  test:
    desc: Run Playwright screenshot tests and generate report
    dir: testing
    cmds:
      - npx playwright test
      - npx tsx lib/report.ts
      - echo "Report written to testing/results/report.md"

  # ── Mining ───────────────────────────────────────────────

  serve:
    desc: Start Fuseki with the mining config (port 3030)
    dir: test
    cmds:
      - java -jar ../{{.FUSEKI_JAR}} --port 3030 --config config.ttl

  load:
    desc: Load the mining dataset via GSP
    cmds:
      - |
        curl -s -X PUT "{{.SERVER_URL}}/mining/data?default" \
          -H "Content-Type: text/turtle" \
          --data-binary @test/data/mining.ttl
      - echo "Loaded test/data/mining.ttl"
      - |
        curl -s -X POST "{{.SERVER_URL}}/mining/data?default" \
          -H "Content-Type: text/turtle" \
          --data-binary @test/data/generated.ttl
      - echo "Loaded test/data/generated.ttl"

  query:
    desc: Run all test queries against the mining server
    dir: test
    cmds:
      - for:
          - queries/01-basic-search.rq
          - queries/02-filtered-search.rq
          - queries/03-facet-counts.rq
          - queries/04-facet-filtered.rq
          - queries/05-combined.rq
          - queries/06-sequence-path-facet.rq
          - queries/07-filter-by-author.rq
          - queries/08-spatial-bbox.rq
        cmd: |
          echo "=== {{.ITEM}} ==="
          curl -s -X POST "{{.SERVER_URL}}/mining/query" \
            -H "Content-Type: application/sparql-query" \
            -H "Accept: text/tab-separated-values" \
            --data-binary @{{.ITEM}}
          echo ""

  app:
    desc: Serve the static demo app with mining config
    cmds:
      - ln -sfn ../test/config.ttl app-static/config.ttl
      - ln -sfn ../test/tests.json app-static/tests.json
      - echo "Serving at http://localhost:8000 (mining → {{.SERVER_URL}})"
      - cmd: python3 -m http.server 8000 --directory app-static

  clean:
    desc: Remove mining TDB2 and Lucene data directories
    dir: test
    cmds:
      - rm -rf DB Lucene
      - echo "Cleaned mining DB and Lucene directories"

  # ── Docker (Fuseki server image) ─────────────────────────

  image-build:
    desc: "Build Docker image for linux/amd64 (optionally: task image-build IMAGE_NAME=myapp IMAGE_TAG=latest)"
    dir: ..
    cmds:
      - docker buildx build --platform linux/amd64 -f demo/test/Dockerfile -t {{.IMAGE_NAME}}:{{.IMAGE_TAG}} --load .

  image-push:
    desc: "Build and push image to ACR (usage: task image-push ACR_NAME=gswadevacr)"
    requires:
      vars: [ACR_NAME]
    deps: [image-build]
    cmds:
      - az account show > /dev/null 2>&1 || az login
      - az acr login --name {{.ACR_NAME}}
      - docker tag {{.IMAGE_NAME}}:{{.IMAGE_TAG}} {{.ACR_NAME}}.azurecr.io/{{.IMAGE_NAME}}:{{.IMAGE_TAG}}
      - docker push {{.ACR_NAME}}.azurecr.io/{{.IMAGE_NAME}}:{{.IMAGE_TAG}}

  ghcr-push:
    desc: "Build and push image to GitHub CR (usage: task ghcr-push)"
    deps: [image-build]
    cmds:
      - gh auth token | docker login ghcr.io -u {{.GHCR_OWNER}} --password-stdin
      - docker tag {{.IMAGE_NAME}}:{{.IMAGE_TAG}} ghcr.io/{{.GHCR_OWNER}}/{{.IMAGE_NAME}}:{{.IMAGE_TAG}}
      - docker push ghcr.io/{{.GHCR_OWNER}}/{{.IMAGE_NAME}}:{{.IMAGE_TAG}}

  docker-start:
    desc: Start Fuseki in Docker (detached)
    dir: test
    env:
      IMAGE_NAME: '{{.IMAGE_NAME}}'
      IMAGE_TAG: '{{.IMAGE_TAG}}'
    cmds:
      - docker compose up -d
      - echo "Fuseki starting at {{.SERVER_URL}}"

  docker-start-ghcr:
    desc: Start Fuseki in Docker (detached) using the GHCR image
    dir: test
    env:
      IMAGE_NAME: 'ghcr.io/{{.GHCR_OWNER}}/{{.IMAGE_NAME}}'
      IMAGE_TAG: '{{.IMAGE_TAG}}'
    cmds:
      - docker compose pull fuseki
      - docker compose up -d
      - echo "Fuseki starting at {{.SERVER_URL}} using ghcr.io/{{.GHCR_OWNER}}/{{.IMAGE_NAME}}:{{.IMAGE_TAG}}"

  docker-stop:
    desc: Stop the Docker Fuseki container
    dir: test
    cmds:
      - docker compose down
      - echo "Fuseki stopped"

  docker-clean:
    desc: Stop Fuseki and remove Docker volumes (DB + Lucene index)
    dir: test
    cmds:
      - docker compose down -v
      - echo "Fuseki stopped and volumes removed"

  docker-serve:
    desc: Start Fuseki in Docker (foreground with logs)
    dir: test
    env:
      IMAGE_NAME: '{{.IMAGE_NAME}}'
      IMAGE_TAG: '{{.IMAGE_TAG}}'
    cmds:
      - docker compose up

  docker-serve-ghcr:
    desc: Start Fuseki in Docker (foreground with logs) using the GHCR image
    dir: test
    env:
      IMAGE_NAME: 'ghcr.io/{{.GHCR_OWNER}}/{{.IMAGE_NAME}}'
      IMAGE_TAG: '{{.IMAGE_TAG}}'
    cmds:
      - docker compose pull fuseki
      - docker compose up

  # ── Loader / Reindexer ──────────────────────────────────

  loader-build:
    desc: Build the loader/reindexer Docker image (extends fuseki-ai)
    deps: [image-build]
    dir: ..
    cmds:
      - docker buildx build --platform linux/amd64 -f demo/loader/Dockerfile --build-arg BASE_IMAGE={{.IMAGE_NAME}} --build-arg BASE_TAG={{.IMAGE_TAG}} -t fuseki-loader:{{.IMAGE_TAG}} --load .

  loader-ghcr-push:
    desc: Build and push loader image to GitHub CR
    deps: [loader-build]
    cmds:
      - gh auth token | docker login ghcr.io -u {{.GHCR_OWNER}} --password-stdin
      - docker tag fuseki-loader:{{.IMAGE_TAG}} ghcr.io/{{.GHCR_OWNER}}/fuseki-loader:{{.IMAGE_TAG}}
      - docker push ghcr.io/{{.GHCR_OWNER}}/fuseki-loader:{{.IMAGE_TAG}}

  loader-acr-push:
    desc: "Build and push loader image to ACR (usage: task loader-acr-push ACR_NAME=gswadevacr)"
    requires:
      vars: [ACR_NAME]
    deps: [loader-build]
    cmds:
      - az account show > /dev/null 2>&1 || az login
      - az acr login --name {{.ACR_NAME}}
      - docker tag fuseki-loader:{{.IMAGE_TAG}} {{.ACR_NAME}}.azurecr.io/fuseki-loader:{{.IMAGE_TAG}}
      - docker push {{.ACR_NAME}}.azurecr.io/fuseki-loader:{{.IMAGE_TAG}}
